<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>简易图形界面</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: "Microsoft Yahei", sans-serif;
        }
        body {
            background-color: #f0f4f8;
            padding: 30px;
        }
        .container {
            max-width: 900px;
            margin: 0 auto;
            background: #fff;
            padding: 25px;
            border-radius: 12px;
            box-shadow: 0 2px 15px rgba(0,0,0,0.1);
        }
        h2 {
            color: #222;
            margin-bottom: 20px;
            text-align: center;
        }
        /* 控制面板样式 */
        .control-panel {
            display: flex;
            gap: 12px;
            margin-bottom: 20px;
            flex-wrap: wrap;
        }
        button {
            padding: 10px 18px;
            border: none;
            border-radius: 6px;
            cursor: pointer;
            font-size: 14px;
            transition: 0.2s;
        }
        #drawRect { background: #409eff; color: white; }
        #drawCircle { background: #67c23a; color: white; }
        #drawLine { background: #e6a23c; color: white; }
        #clearCanvas { background: #f56c6c; color: white; }
        button:hover {
            opacity: 0.85;
        }
        /* 画布容器 */
        .canvas-box {
            border: 2px solid #dcdfe6;
            border-radius: 8px;
            overflow: hidden;
        }
        canvas {
            background: #fafafa;
            display: block;
        }
    </style>
</head>
<body>
<div class="container">
    <h2>HTML Canvas 简易图形绘制界面</h2>
    <!-- 操作按钮区 -->
    <div class="control-panel">
        <button id="drawRect">绘制矩形</button>
        <button id="drawCircle">绘制圆形</button>
        <button id="drawLine">绘制渐变线条</button>
        <button id="clearCanvas">清空画布</button>
    </div>
    <!-- 绘图画布 -->
    <div class="canvas-box">
        <canvas id="canvas" width="850" height="450"></canvas>
    </div>
</div>

<script>
    // 获取画布和上下文
    const canvas = document.getElementById('canvas');
    const ctx = canvas.getContext('2d');

    // 绘制矩形
    document.getElementById('drawRect').addEventListener('click', () => {
        ctx.fillStyle = '#409eff';
        ctx.fillRect(80, 80, 160, 120);
        // 描边
        ctx.strokeStyle = '#0056cc';
        ctx.lineWidth = 3;
        ctx.strokeRect(80, 80, 160, 120);
    })

    // 绘制圆形
    document.getElementById('drawCircle').addEventListener('click', () => {
        ctx.beginPath();
        ctx.arc(420, 140, 70, 0, Math.PI * 2);
        // 径向渐变
        const gradient = ctx.createRadialGradient(420,140,10,420,140,70);
        gradient.addColorStop(0, '#a8e6cf');
        gradient.addColorStop(1, '#67c23a');
        ctx.fillStyle = gradient;
        ctx.fill();
        ctx.strokeStyle = '#2d882d';
        ctx.lineWidth = 3;
        ctx.stroke();
    })

    // 绘制渐变线条
    document.getElementById('drawLine').addEventListener('click', () => {
        const lineGrad = ctx.createLinearGradient(100,300,750,300);
        lineGrad.addColorStop(0, '#e6a23c');
        lineGrad.addColorStop(0.5, '#ff7d00');
        lineGrad.addColorStop(1, '#ff3d00');
        ctx.strokeStyle = lineGrad;
        ctx.lineWidth = 6;
        ctx.beginPath();
        ctx.moveTo(100, 300);
        ctx.lineTo(750, 300);
        ctx.stroke();
    })

    // 清空画布
    document.getElementById('clearCanvas').addEventListener('click', () => {
        ctx.clearRect(0, 0, canvas.width, canvas.height);
    })
</script>
</body>
</html>
